# Nom affiché dans l'onglet Actions de GitHub
name: Workflow d'initiation

# Déclencheur : sur quel événement le workflow se lance
on: push

jobs:
  # Nom du job
  saluer-le-monde:
    # Machine virtuelle utilisée pour exécuter le job
    runs-on: ubuntu-latest

    # Liste des étapes du job
    steps:
      # Étape 1 — message de bienvenue
      - name: Afficher le message
        run: echo "Bonjour depuis GitHub Actions !"

      # Étape 2 — date du jour
      - name: Afficher la date
        run: date

      # Étape 3 — acteur du push (utilisateur GitHub qui a déclenché le workflow)
      - name: Afficher l'acteur
        run: echo "Déclenché par ${{ github.actor }}"
